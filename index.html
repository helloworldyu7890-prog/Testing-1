<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BurmaYoYar-HD - Premium Bold Edition</title>
    
    <script src="https://pl30149725.effectivecpmnetwork.com/72/36/71/723671d6fb365692e8aae17ed2085563.js"></script>
    <script src="https://pl30149726.effectivecpmnetwork.com/22/3d/45/223d45507315c360b0744fa53a9dbbfc.js"></script>

    <style>
        :root {
            --bg-color: #f4eae1;
            --main-text: #2a221f;
            --accent-color: #8c7b75;
            --border-color: #5c4e48; /* Frame အတွက် အရောင် */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; font-weight: 600; }
        
        body { background-color: var(--bg-color); color: var(--main-text); }
        .app-container { max-width: 480px; margin: auto; min-height: 100vh; padding-bottom: 20px; }

        /* Header */
        header { padding: 20px; text-align: center; border-bottom: 2px solid var(--border-color); }
        .header-brand h2 { font-size: 24px; text-transform: uppercase; }

        /* Hero Banner with Frame */
        .hero-banner-section {
            margin: 15px;
            padding: 25px;
            border: 3px solid var(--border-color);
            background-color: #eaddd3;
            border-radius: 12px;
        }
        .hero-sub { font-size: 14px; color: var(--border-color); margin-bottom: 10px; }
        .hero-main-title { font-size: 16px; line-height: 1.5; color: var(--main-text); }

        /* Category Grid with Frame */
        .top-categories-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 10px 15px; }
        .circle-category-card {
            border: 2px solid var(--border-color);
            padding: 10px;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            background: #eaddd3;
        }

        /* Video Grid with Frame */
        .shakes-style-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 15px; }
        .shake-premium-card {
            border: 2px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            background: #eaddd3;
        }
        .shake-thumb-placeholder { width: 100%; aspect-ratio: 16/10; background: #ccc; }
        .shake-thumb-placeholder img { width: 100%; height: 100%; object-fit: cover; }
        .shake-card-info { padding: 8px; }
        .shake-card-info h4 { font-size: 12px; height: 3em; overflow: hidden; }

        /* General Styles */
        .section-left-title { padding: 0 15px; margin-top: 20px; }
        .section-left-title h3 { font-size: 16px; border-left: 4px solid var(--border-color); padding-left: 10px; }
        
        .search-container { padding: 15px; }
        .search-box { border: 2px solid var(--border-color); border-radius: 8px; display: flex; overflow: hidden; }
        .search-box input { flex: 1; border: none; padding: 10px; outline: none; background: #eaddd3; }
        .search-btn { border: none; background: var(--border-color); color: #fff; padding: 0 15px; }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <div class="header-brand"><h2>BURMA <span style="color:var(--accent-color)">YOYAR</span>-HD</h2></div>
    </header>

    <div class="search-container">
        <div class="search-box">
            <input type="text" id="userSearchInput" placeholder="ရှာဖွေရန်...">
            <button class="search-btn" onclick="triggerSearch()">ရှာပါ</button>
        </div>
    </div>

    <!-- Hero Banner with Frame -->
    <div class="hero-banner-section">
        <div class="hero-sub" id="animatedTitle"></div>
        <div class="hero-main-title" id="animatedBody"></div>
    </div>

    <div class="top-categories-grid">
        <div class="circle-category-card" onclick="fetchNewCategory('myanmar')">Myanmar</div>
        <div class="circle-category-card" onclick="fetchNewCategory('japan')">Japan</div>
        <div class="circle-category-card" onclick="fetchNewCategory('asian')">Asian</div>
    </div>

    <div class="section-left-title"><h3>LATEST RELEASES</h3></div>
    <div class="shakes-style-grid" id="shakesGrid"></div>

</div>

<script>
    const titleText = "ပရီမီယမ် ရသခံစားမှု့";
    const bodyText = "မြန်မာကားများတင်သာမက VIP, LOCAL LEAK , အဆင့်မြင့် အာရှ ဇာတ်ကားပေါင်းများစွာကို ပရီမီယမ်ဆန်စွာ အခမဲ့ ကြည့်ရှုနိူင်ပြီ!";

    function startTextAnimations() {
        let titleIdx = 0; let bodyIdx = 0;
        const titleContainer = document.getElementById("animatedTitle");
        const bodyContainer = document.getElementById("animatedBody");

        function typeTitle() {
            if (titleIdx < titleText.length) {
                titleContainer.innerHTML += titleText.charAt(titleIdx);
                titleIdx++; setTimeout(typeTitle, 50);
            } else { typeBody(); }
        }
        function typeBody() {
            if (bodyIdx < bodyText.length) {
                bodyContainer.innerHTML += bodyText.charAt(bodyIdx);
                bodyIdx++; setTimeout(typeBody, 20);
            }
        }
        typeTitle();
    }

    async function loadContent(keyword) {
        const res = await fetch(`https://www.eporner.com/api/v2/video/search/?query=${keyword}&per_page=6`);
        const data = await res.json();
        const grid = document.getElementById("shakesGrid");
        grid.innerHTML = "";
        data.videos.forEach(v => {
            grid.innerHTML += `
                <div class="shake-premium-card">
                    <div class="shake-thumb-placeholder"><img src="${v.default_thumb.src}"></div>
                    <div class="shake-card-info"><h4>${v.title}</h4></div>
                </div>
            `;
        });
    }

    function triggerSearch() {
        const q = document.getElementById("userSearchInput").value;
        loadContent(q);
    }

    function fetchNewCategory(c) { loadContent(c); }

    document.addEventListener("DOMContentLoaded", () => {
        startTextAnimations();
        loadContent('myanmar');
    });
</script>
</body>
</html>
