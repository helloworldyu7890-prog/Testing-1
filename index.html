<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phaung Dain MM - Premium Streaming</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #0b0f19; color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding-bottom: 50px; }
        header { background: linear-gradient(180deg, #111827 0%, rgba(17,24,39,0) 100%); padding: 20px; text-align: center; }
        .logo { color: #ef4444; font-size: 28px; font-weight: bold; text-decoration: none; letter-spacing: 1px; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        /* Video Section */
        .main-video-container { background-color: #1f2937; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.5); margin-bottom: 30px; }
        .video-wrapper { position: relative; padding-bottom: 56.25%; /* 16:9 Aspect Ratio */ height: 0; overflow: hidden; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        .video-info { padding: 20px; }
        .video-title { font-size: 20px; font-weight: 600; margin-bottom: 10px; color: #f3f4f6; }
        
        /* Grid Section */
        .section-title { font-size: 22px; margin-bottom: 20px; border-left: 4px solid #ef4444; padding-left: 10px; }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .video-card { background-color: #111827; border-radius: 8px; overflow: hidden; transition: transform 0.2s; cursor: pointer; text-decoration: none; display: block; }
        .video-card:hover { transform: translateY(-5px); }
        .thumbnail-box { position: relative; background-color: #374151; width: 100%; height: 160px; display: flex; align-items: center; justify-content: center; }
        .play-icon { font-size: 40px; color: rgba(255,255,255,0.8); }
        .card-info { padding: 12px; color: #d1d5db; font-size: 14px; }
    </style>

    <!-- ⚠️ အရေးကြီး - ADSTERRA POPUNDER CODE ကို အောက်ကနေရာမှာ ထည့်ပါ -->
    <!-- <script type='text/javascript' src='//plxxxxxxx.com/.../invoke.js'></script> -->
    
</head>
<body>

    <header>
        <a href="#" class="logo">PHAUNG DAIN <span style="color:#fff;">MM</span></a>
    </header>

    <div class="container">
        
        <!-- Main Featured Video (လတ်တလောတင်ထားတဲ့ ကားကြီး) -->
        <h2 class="section-title">ယခုအပတ် အသစ်စက်စက် ဗီဒီယို</h2>
        <div class="main-video-container">
            <div class="video-wrapper">
                <!-- မင်းရဲ့ ရုပ်ရှင် Link (Doodstream သို့မဟုတ် Embed link) ကို src မှာ ထည့်ပါ -->
                <iframe src="https://dood.li/e/မင်းရဲ့ဗီဒီယိုကုဒ်" scrolling="no" frameborder="0" allowfullscreen="true"></iframe>
            </div>
            <div class="video-info">
                <h1 class="video-title">မြန်မာအသစ်စက်စက် မင်းသမီးချောလေး (ရုပ်သံကြည်လင်မှု 1080p)</h1>
            </div>
        </div>

        <!-- More Videos Grid (တခြားဗီဒီယိုများ စာရင်း) -->
        <h2 class="section-title">ဆက်စပ်ဗီဒီယိုများ</h2>
        <div class="video-grid">
            
            <!-- ကတ် တစ်ကတ်ချင်းစီ ပုံစံ -->
            <a href="#" class="video-card">
                <div class="thumbnail-box">
                    <!-- Thumbnail ပုံရှိရင် img tag နဲ့ ထည့်လို့ရပါတယ် -->
                    <span class="play-icon">▶</span>
                </div>
                <div class="card-info">
                    မြန်မာအိမ်တွင်းဖြစ် စုံတွဲ အပိုင်း (၁)
                </div>
            </a>

            <a href="#" class="video-card">
                <div class="thumbnail-box">
                    <span class="play-icon">▶</span>
                </div>
                <div class="card-info">
                    နန်းတွင်းဇာတ်လမ်းတွဲ အသစ်
                </div>
            </a>

            <a href="#" class="video-card">
                <div class="thumbnail-box">
                    <span class="play-icon">▶</span>
                </div>
                <div class="card-info">
                    အာရှမော်ဒယ်လ် အလန်းဇာတ်ကား
                </div>
            </a>

        </div>
    </div>

</body>
</html>
