<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BurmaYoYar-HD | Modern Glass</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --primary-accent: #6C5CE7;
            --text-white: #FFFFFF;
            --app-dark: #0A0A0A;
            --gold: #FFD700;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--app-dark); color: var(--text-white); }
        
        .app-container { max-width: 480px; margin: auto; padding: 20px; min-height: 100vh; }
        
        .brand-logo { font-size: 24px; font-weight: 800; background: linear-gradient(to right, #6C5CE7, #A8A4E6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; text-align: center; }

        .search-box { background: var(--glass-bg); backdrop-filter: blur(10px); border: 1px solid var(--glass-border); border-radius: 30px; padding: 12px 20px; margin-bottom: 20px; display: flex; }
        .search-box input { flex-grow: 1; background: transparent; border: none; color: white; outline: none; }
        .search-box button { background: none; border: none; color: var(--gold); cursor: pointer; font-weight: bold; }

        .cat-bar { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 10px; }
        .cat-btn { background: var(--glass-bg); border: 1px solid var(--glass-border); color: white; padding: 8px 16px; border-radius: 20px; font-size: 12px; cursor: pointer; white-space: nowrap; }

        .new-content-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .video-card { background: var(--glass-bg); border-radius: 12px; overflow: hidden; border: 1px solid var(--glass-border); cursor: pointer; transition: 0.3s; }
        .video-card:active { transform: scale(0.95); }
        .video-card img { width: 100%; height: 120px; object-fit: cover; }
        .video-title { font-size: 11px; padding: 8px; line-height: 1.3; height: 35px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

        #theaterBox { display: none; margin-bottom: 20px; }
        .video-player { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; }
        .video-player iframe { width: 100%; height: 100%; border: none; }
        
        .loader { text-align: center; padding: 20px; color: var(--gold); }
    </style>
</head>
<body>

<div class="app-container">
    <div class="brand-logo" onclick="location.reload()">BurmaYoYar HD</div>
    
    <div class="search-box">
        <input type="text" id="userSearchInput" placeholder="ရှာဖွေရန်...">
        <button onclick="triggerSearch()">ရှာပါ</button>
    </div>

    <div class="cat-bar">
        <button class="cat-btn" onclick="fetchNewCategory('myanmar')">Myanmar</button>
        <button class="cat-btn" onclick="fetchNewCategory('japan')">Japan</button>
        <button class="cat-btn" onclick="fetchNewCategory('asian')">Asian</button>
    </div>

    <div id="theaterBox">
        <div class="video-player">
            <iframe id="videoIframe" src=""></iframe>
        </div>
        <p id="videoTitle" style="margin-top:10px; font-size: 13px;"></p>
    </div>

    <div class="new-content-grid" id="shakesGrid"></div>
    <div class="loader" id="networkLoader" style="display:none;">Loading...</div>
</div>

<script>
    const API_URL = 'https://www.eporner.com/api/v2/video/search/';
    let currentKeyword = 'myanmar';
    let currentPage = 1;
    let loading = false;
    let loadedVideoIds = new Set();

    async function loadContentFeed(keyword, page, append = false) {
        if (loading) return;
        loading = true;
        document.getElementById("networkLoader").style.display = "block";

        try {
            const res = await fetch(`${API_URL}?query=${encodeURIComponent(keyword)}&per_page=20&page=${page}`);
            const data = await res.json();

            if (!append) document.getElementById("shakesGrid").innerHTML = "";

            data.videos.forEach(v => {
                if (!loadedVideoIds.has(v.id)) {
                    loadedVideoIds.add(v.id);
                    const div = document.createElement("div");
                    div.className = "video-card";
                    div.onclick = () => playVideo(v.embed, v.title);
                    div.innerHTML = `
                        <img src="${v.default_thumb.src}" loading="lazy">
                        <div class="video-title">${v.title}</div>
                    `;
                    document.getElementById("shakesGrid").appendChild(div);
                }
            });
        } catch (e) { console.error(e); }
        finally { loading = false; document.getElementById("networkLoader").style.display = "none"; }
    }

    function playVideo(url, title) {
        window.scrollTo({top: 0, behavior: 'smooth'});
        document.getElementById("theaterBox").style.display = "block";
        document.getElementById("videoIframe").src = url;
        document.getElementById("videoTitle").innerText = title;
    }

    function triggerSearch() {
        const query = document.getElementById("userSearchInput").value;
        if (!query) return;
        currentKeyword = query;
        currentPage = 1;
        loadedVideoIds.clear();
        loadContentFeed(currentKeyword, currentPage);
    }

    function fetchNewCategory(cat) {
        currentKeyword = cat;
        currentPage = 1;
        loadedVideoIds.clear();
        document.getElementById("theaterBox").style.display = "none";
        loadContentFeed(currentKeyword, currentPage);
    }

    window.onscroll = () => {
        if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 500) {
            if (!loading) { currentPage++; loadContentFeed(currentKeyword, currentPage, true); }
        }
    };

    // Initial Load
    loadContentFeed(currentKeyword, currentPage);
</script>

</body>
</html>
